# =============================================================================
# Example: Using cbom in a GitHub Actions CI pipeline
# =============================================================================
# This workflow runs on every Pull Request. It scans both the base branch
# and the PR branch, then diffs the two CBOMs. If new cryptography is
# introduced, the pipeline fails (exit code 1).
#
# With --strict mode, the pipeline will also fail if any deprecated or
# critically insecure algorithm (MD5, SHA-1, DES, hardcoded IVs, etc.)
# is detected in the newly introduced crypto.
# =============================================================================

name: Crypto Gate

on:
  pull_request:
    branches: [main]

jobs:
  cbom-diff:
    name: CBOM Diff Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: head

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            head/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('head/Cargo.lock') }}

      - name: Install cbom
        run: cargo install --path ./head

      # -- Scan both branches --

      - name: Scan base branch
        run: cbom scan --path ./base > base-cbom.json

      - name: Scan head branch
        run: cbom scan --path ./head > head-cbom.json

      # -- Diff with strict mode --
      # Fails if new crypto is introduced AND any of it is deprecated/insecure.
      # Remove --strict to only fail on new crypto (regardless of severity).

      - name: Diff — fail if insecure crypto is introduced
        run: cbom diff --base base-cbom.json --head head-cbom.json --strict

      # -- Optional: Generate CycloneDX CBOM artifact --

      - name: Generate CycloneDX CBOM
        if: always()
        run: cbom scan --path ./head --format cyclonedx > cbom-cyclonedx.json

      - name: Upload CBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbom-report
          path: |
            head-cbom.json
            cbom-cyclonedx.json
